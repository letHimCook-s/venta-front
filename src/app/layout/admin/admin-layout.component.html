<div class="grid min-h-screen grid-cols-1 md:grid-cols-[240px_1fr]">
  <aside class="border-b border-slate-200 bg-white p-4 md:border-b-0 md:border-r">
    <h2 class="mb-3 text-lg font-black tracking-tight text-slate-900">Admin</h2>
    <nav class="grid gap-2">
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="dashboard">Dashboard</a>
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="products">Productos</a>
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="categories">Categorias</a>
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="attributes">Atributos</a>
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="offers">Ofertas</a>
      <a class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" routerLink="store-settings">Tienda</a>
      <button
        type="button"
        class="rounded-lg border border-slate-200 px-3 py-2 text-left text-sm font-semibold text-slate-700 hover:bg-slate-100"
        (click)="logout()"
      >
        Cerrar sesion
      </button>
    </nav>
  </aside>
  <main class="p-4">
    <router-outlet />
  </main>
</div>
