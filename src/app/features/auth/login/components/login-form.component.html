<section class="mx-auto w-full max-w-[380px] rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h1 class="text-center text-2xl font-black tracking-tight text-slate-900">Bienvenido nuevamente</h1>

  <form class="mt-4 grid gap-3" novalidate (ngSubmit)="submit()">
    <input
      name="username"
      [(ngModel)]="username"
      type="text"
      placeholder="Usuario"
      class="h-10 rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-slate-500"
      required
    />

    <input
      name="password"
      [(ngModel)]="password"
      type="password"
      placeholder="Contrasena"
      class="h-10 rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-slate-500"
      required
    />

    @if (errorMessage) {
      <p class="rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
        {{ errorMessage }}
      </p>
    }

    <button
      type="submit"
      class="h-10 rounded-lg bg-blue-900 text-sm font-semibold text-white transition hover:bg-blue-800"
    >
      Continuar
    </button>

    <button
      type="button"
      (click)="goToRegister()"
      class="grid h-10 place-items-center rounded-lg bg-blue-900 text-sm font-semibold text-white no-underline transition hover:bg-blue-800"
    >
      Crear Cuenta
    </button>

    <button type="button" class="text-sm text-slate-500">¿Olvido su contrasena?</button>

    <div class="mt-1 grid gap-2">
      <button type="button" class="social-btn">Continuar con Google</button>
      <button type="button" class="social-btn">Continuar con una cuenta de Microsoft</button>
      <button type="button" class="social-btn">Continuar con Apple</button>
    </div>
  </form>

  <div class="mt-4 rounded-md border border-dashed border-slate-300 bg-slate-50 p-2.5 text-[11px] text-slate-600">
    <p><strong>Admin:</strong> admin / admin123</p>
    <p><strong>Usuario:</strong> user / user123</p>
  </div>
</section>
