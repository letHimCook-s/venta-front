<section class="options-panel">
  <h4>Opciones de navbar</h4>
  <p>Edita logo, enlaces y bloques visuales del header.</p>

  <div class="actions">
    <button type="button" (click)="emit('addText')">Texto</button>
    <button type="button" (click)="emit('addBlock')">Bloque</button>
    <button type="button" (click)="emit('removeSelected')">Eliminar</button>
    <button type="button" (click)="emit('clearCanvas')">Limpiar</button>
  </div>

  <div class="image-tools">
    <input
      type="url"
      [ngModel]="imageUrl"
      (ngModelChange)="onImageUrlChange($event)"
      placeholder="https://.../logo.jpg"
    />
    <button type="button" (click)="emit('addImage')">Agregar logo/imagen</button>
  </div>

  <div class="save-actions">
    <button type="button" class="primary" (click)="emit('saveSection')">Guardar navbar</button>
    <button type="button" (click)="emit('resetSection')">Reiniciar navbar</button>
  </div>
</section>
