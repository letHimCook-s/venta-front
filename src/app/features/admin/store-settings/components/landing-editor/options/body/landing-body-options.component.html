<section class="options-panel">
  <h4>{{ sectionLabel }}</h4>
  <p>Define banners, bloques de contenido y destacados visuales.</p>

  <div class="actions">
    <button type="button" (click)="emit('addText')">Titulo o texto</button>
    <button type="button" (click)="emit('addBlock')">Bloque destacado</button>
    <button type="button" (click)="emit('removeSelected')">Eliminar</button>
    <button type="button" (click)="emit('clearCanvas')">Limpiar</button>
  </div>

  <div class="image-tools">
    <input
      type="url"
      [ngModel]="imageUrl"
      (ngModelChange)="onImageUrlChange($event)"
      placeholder="https://.../banner.jpg"
    />
    <button type="button" (click)="emit('addImage')">Agregar imagen</button>
  </div>

  <div class="save-actions">
    <button type="button" class="primary" (click)="emit('saveSection')">Guardar seccion</button>
    <button type="button" (click)="emit('resetSection')">Reiniciar seccion</button>
  </div>
</section>
