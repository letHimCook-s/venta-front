<section class="attribute-panel" *ngIf="isInspectorVisible; else emptyPanel">
  <article class="card inspector-card">
    <header class="card-header inspector-header">
      <h3>{{ form.id ? 'Editar atributo' : 'Nuevo atributo' }}</h3>
    </header>

    <form class="form-grid" (ngSubmit)="submitAttribute()">
      <label>
        Nombre
        <input
          type="text"
          name="name"
          [(ngModel)]="form.name"
          placeholder="Ej: Talla"
          required
        />
      </label>

      <label>
        Codigo
        <input
          type="text"
          name="code"
          [(ngModel)]="form.code"
          placeholder="Ej: talla"
        />
      </label>

      <label>
        Tipo de dato
        <select name="valueType" [(ngModel)]="form.valueType">
          <option *ngFor="let item of valueTypeOptions" [value]="item.value">{{ item.label }}</option>
        </select>
      </label>

      <label *ngIf="shouldShowOptions()">
        Opciones separadas por coma
        <input
          type="text"
          name="options"
          [(ngModel)]="form.optionsInput"
          placeholder="Ej: S, M, L, XL"
        />
      </label>

      <label class="checkbox-item">
        <input type="checkbox" name="required" [(ngModel)]="form.required" />
        <span>Requerido para productos de la categoria</span>
      </label>

      <div class="form-actions">
        <button type="button" class="ghost" (click)="closeInspector()">Cerrar</button>
        <button type="submit">{{ form.id ? 'Guardar cambios' : 'Crear atributo' }}</button>
        <button
          type="button"
          class="ghost danger"
          *ngIf="form.id"
          (click)="deleteAttribute(form.id)"
        >
          Eliminar
        </button>
      </div>
    </form>

    <p class="feedback ok" *ngIf="feedbackMessage">{{ feedbackMessage }}</p>
    <p class="feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </article>
</section>

<ng-template #emptyPanel>
  <section class="attribute-panel-placeholder">
    <p>Pulsa <strong>Nuevo atributo</strong> para abrir el formulario en el panel derecho.</p>
  </section>
</ng-template>
