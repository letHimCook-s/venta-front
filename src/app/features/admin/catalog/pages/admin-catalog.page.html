<section class="page">
  <header class="page-topbar">
    <h1>Categorias y atributos</h1>
  </header>

  <section class="section-panel">
    @if (activeSection === 'categories') {
      <app-categories-table
        [createCategoryRequestId]="createCategoryRequestId"
        (createCategoryRequested)="createCategoryFromHeader()"
        (createAttributeRequested)="createAttributeFromHeader()"
      />
    }

    @if (activeSection === 'attributes') {
      <div class="attributes-layout" [class.panel-open]="isAttributeInspectorVisible">
        <app-categories-table
          (createCategoryRequested)="createCategoryFromHeader()"
          (createAttributeRequested)="createAttributeFromHeader()"
        />

        <app-attributes-manager
          [openCreateRequestId]="openCreateAttributeRequestId"
          (inspectorVisibilityChange)="onAttributeInspectorVisibilityChange($event)"
        ></app-attributes-manager>
      </div>
    }
  </section>
</section>
