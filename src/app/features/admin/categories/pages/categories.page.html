<section class="page">
  <header class="page-topbar">
    <h1>Categorias y atributos</h1>

    <button type="button" class="topbar-cta" (click)="createCategoryFromHeader()">
      <span class="plus">+</span>
      <span>Nueva categoria</span>
    </button>
  </header>

  <p class="section-caption">
    Todo en una sola seccion: administra el arbol de categorias y los atributos
    con botones independientes para cada funcionalidad.
  </p>

  <div class="section-switch">
    <button
      type="button"
      class="switch-btn"
      [class.active]="activeSection === 'categories'"
      (click)="selectSection('categories')"
    >
      Categorias
    </button>

    <button
      type="button"
      class="switch-btn"
      [class.active]="activeSection === 'attributes'"
      (click)="selectSection('attributes')"
    >
      Atributos
    </button>
  </div>

  <section *ngIf="activeSection === 'categories'" class="section-panel">
    <app-categories-table [createCategoryRequestId]="createCategoryRequestId" />
  </section>

  <section *ngIf="activeSection === 'attributes'" class="section-panel">
    <app-attributes-manager />
  </section>
</section>
