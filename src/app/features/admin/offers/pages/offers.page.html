<section class="page">
  <header class="page-topbar">
    <h1>Gestion de ofertas</h1>
  </header>

  @if (feedbackMessage) {
    <p class="feedback success">{{ feedbackMessage }}</p>
  }

  <app-offers-list
    [products]="products"
    (applyBulkDiscount)="onApplyBulkDiscount($event)"
    (clearBulkDiscount)="onClearBulkDiscount($event)"
  ></app-offers-list>
</section>
